meters:
- name: encoding_minutes
  description: Minutes of video encoded, billed per minute by output resolution and quality tier.
  unit: minutes
  aggregation: sum
  dimensions:
  - workspace
  - resolution
  - tier
- name: storage_minutes
  description: Minutes of encoded video stored, billed per stored minute by resolution.
  unit: minutes
  aggregation: sum
  dimensions:
  - workspace
  - resolution
- name: streaming_minutes
  description: Minutes of video delivered to viewers, billed per delivered minute by resolution.
  unit: minutes
  aggregation: sum
  dimensions:
  - workspace
  - resolution
- name: live_minutes
  description: Minutes of live stream ingest/processing, billed per streamed minute.
  unit: minutes
  aggregation: sum
  dimensions:
  - workspace
  - resolution
- name: ai_minutes
  description: Minutes processed by in-video AI features (subtitles, summaries, chapters, moderation), billed as per-minute add-ons.
  unit: minutes
  aggregation: sum
  dimensions:
  - workspace
  - feature
principles:
- name: Visibility
  description: Pull FastPix usage/billing data; track per-minute encode, storage, and delivery burn by workspace and resolution.
- name: Allocation
  description: Tag media metadata and use separate workspaces per team/product to map spend to cost centers.
- name: Optimization
  description: Cap max resolution to what viewers actually consume, use the free Standard encoding tier where fidelity allows, prune unused stored assets, and enable AI features selectively.
- name: Accountability
  description: Assign owners per workspace; review monthly encode/storage/delivery spend against budget.
