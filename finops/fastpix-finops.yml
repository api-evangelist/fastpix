description: >-
  FinOps view of FastPix spend. FastPix bills usage-based, per-minute rates
  across three cost dimensions - encoding, storage, and streaming (delivery) -
  each scaling by output resolution and quality tier. Live streaming is metered
  per streamed minute, and in-video AI features (subtitles, summaries, chapters,
  moderation) are per-minute add-ons. There is no minimum commitment; new
  accounts start on a $25 trial credit.
notes: >-
  Per-minute rates vary by resolution and quality tier and change over time;
  verify against the FastPix pricing page during reconciliation.
