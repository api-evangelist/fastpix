aid: fastpix
url: https://raw.githubusercontent.com/api-evangelist/fastpix/refs/heads/main/apis.yml
name: FastPix
kind: company
description: FastPix is a developer-first video platform offering APIs for video
  on-demand (upload, ingest, encoding, playback), live streaming, simulcasting,
  secure and DRM playback, in-video AI (transcription, summaries, chapters,
  moderation), and video views analytics. A Mux-style, pay-per-minute video
  infrastructure with a single REST API at api.fastpix.io/v1 using Basic auth.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Video
- Streaming
- Live Streaming
- Video on Demand
- Encoding
- Playback
- Video Analytics
created: '2026-07-01'
modified: '2026-07-01'
specificationVersion: '0.19'
